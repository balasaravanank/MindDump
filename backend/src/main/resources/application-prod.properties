# ===================================
# MindDump - Production Configuration
# ===================================

# PostgreSQL Database (Render)
# Render provides DATABASE_INTERNAL_URL in postgres:// format.
# Spring Boot needs jdbc:postgresql:// format, so we construct it from parts.
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 in production
spring.h2.console.enabled=false

# Groq API
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# CORS - will be set via environment variable
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Server
server.port=${PORT:8080}
